name: Actualizador de Votaciones

# Se ejecutará automáticamente todos los domingos a la medianoche (puedes cambiarlo)
# o manualmente haciendo clic en un botón en GitHub.
on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el Scraper
        run: python scraper.py

      - name: Guardar los cambios (Commit del archivo .txt)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # Verificamos si el archivo fue creado por el scraper
          if [ -f resultados_votaciones.txt ]; then
            git add resultados_votaciones.txt
            git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de base de datos de votaciones"
            git push
          else
            echo "El archivo resultados_votaciones.txt no se generó. Probablemente no hubo datos nuevos o la conexión falló."
          fi
